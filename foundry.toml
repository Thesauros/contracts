[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path = 'cache_forge'
solc_version = '0.8.34'
ignored_error_codes = ['license', 'code-size', 'init-code-size', 'transient-storage', 2424, 4591]

[lint]
mixed_case_exceptions = ['ERC', 'URI', 'ACL', 'ETH']

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
