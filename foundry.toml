[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path = 'cache_forge'
solc_version = '0.8.34'
optimizer = true
optimizer_runs = 200
ignored_error_codes = ['license', 'code-size', 'init-code-size', 'transient-storage', 2424, 4591]

[profile.unoptimized]
src = 'contracts'
out = 'out-unoptimized'
libs = ['node_modules', 'lib']
test = 'test'
cache_path = 'cache_forge_unoptimized'
solc_version = '0.8.34'
optimizer = false
ignored_error_codes = ['license', 'code-size', 'init-code-size', 'transient-storage', 2424, 4591]

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
base = "${BASE_RPC_URL}"
